<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>Auth Callback</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:760px;margin:40px auto;padding:0 16px;line-height:1.5}
  code{background:#f2f2f2;padding:2px 6px;border-radius:4px;word-break:break-all}
  .box{background:#f7f7f7;border:1px solid #ddd;border-radius:8px;padding:16px;margin:16px 0}
  textarea{width:100%;height:90px;font-family:monospace;font-size:13px;padding:8px}
  button{padding:8px 16px;font-size:14px;cursor:pointer}
  .ok{color:#1a7f37;font-weight:600}
</style>
</head>
<body>
<h2>Tesla Auth Callback</h2>
<div id="out">Bu sayfa, Tesla giriş yönlendirmesi için bekliyor.</div>
<script>
  const p = new URLSearchParams(location.search);
  const code = p.get('code');
  const err = p.get('error');
  const out = document.getElementById('out');
  if (code) {
    out.innerHTML = '<p class="ok">✓ Yetki kodu alındı. Aşağıdaki kodu kopyalayıp asistanına ver:</p>'
      + '<div class="box"><textarea id="c" readonly>'+code+'</textarea>'
      + '<button onclick="navigator.clipboard.writeText(document.getElementById(\'c\').value)">Kopyala</button></div>'
      + '<p style="color:#666;font-size:13px">Not: Bu kod tek kullanımlık ve birkaç dakika geçerlidir.</p>';
  } else if (err) {
    out.innerHTML = '<p style="color:#b00">Hata: '+err+' — '+(p.get('error_description')||'')+'</p>';
  }
</script>
</body>
</html>
